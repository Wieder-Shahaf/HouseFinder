services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/listings.db
    env_file:
      - .env
    volumes:
      - sqlite_data:/data
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    networks:
      - app_network

volumes:
  sqlite_data:

networks:
  app_network:
